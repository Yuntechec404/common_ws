TebLocalPlannerROS:

 odom_topic: wheel_odom
 map_frame: map #map odom

 # Trajectory
 teb_autosize: true

 # Robot Configuration Parameters
 acc_lim_x : 0.2 # 0.5
 acc_lim_theta : 0.25 # 0.5
 max_vel_x : 0.3 # 0.4
 max_vel_x_backwards : 0.1 # 0.2
 max_vel_theta : 0.8 # 0.3
 min_turning_radius : 0.0 # 0.4 , 0.0 mean Spin in place
 wheelbase: 0.35 # 0.25 # 0.4
 cmd_angle_instead_rotvel: false
 max_vel_y:  0.0 
 acc_lim_y: 0.0 ##0.5
 footprint_model:  #types: "point", "circular", "two_circles", "line", "polygon"
    type: "polygon" 
    vertices: [ [0.35, 0.32],[0.35, -0.32],[-0.35, -0.32],[-0.35, 0.32]]
    # vertices: [ [0.31, 0.25],[0.31, -0.25],[-0.31, -0.25],[-0.31, 0.25]]
    # vertices: [ [0.38, 0.35],[0.38, -0.35],[-0.38, -0.35],[-0.38, 0.35]]
    # vertices: [ [0.31, 0.25],[0.31, -0.25],[-0.31, -0.25],[-0.31, 0.25],[0.31, 0.25]]  

    #radius: 0.20 # for type "circular"
    #vertices: [[1.75,-0.575],[1.75,0.575],[-0.25,0.575],[-0.25,0.3],[-0.75,0.3],[-0.75,-0.3],[-0.25,-0.3],[-0.25,-0.575]]
    
# Goal Tolerance Parameters
 xy_goal_tolerance: 0.15 # Default 0.2
 yaw_goal_tolerance: 0.2 #* 0.35   #0.4 # Default 0.2
 free_goal_vel: false   # 保持 False，確保到點時要對正

 # Trajectory Configuration Parameters
 dt_ref : 0.5
 dt_hysteresis : 0.3
 min_samples : 3
 global_plan_overwrite_orientation : false
 global_plan_viapoint_sep : -0.1
 max_global_plan_lookahead_dist : 5.0 # 10.0 # 0.6 #NEED TO CHANGE # 3.0 *
 force_reinit_new_goal_dist : 1.0
 feasibility_check_no_poses  : 3
 publish_feedback  : true
 shrink_horizon_backup : true
 allow_init_with_backwards_motion : true # false  # 可選，讓局部姿態跟著全局路線方向
 exact_arc_length : false
 shrink_horizon_min_duration : 10.0

# Obstacle Parameters
 min_obstacle_dist: 0.3 # 0.3 # 0.7
 include_costmap_obstacles: true   # false true
 costmap_obstacles_behind_robot_dist: 1.0
 obstacle_poses_affected: 25 #30
 inflation_dist: 0.2 # 0.6
 include_dynamic_obstacles: false  # false true * If this parameter is set to true, the motion of obstacles with non-zero velocity (provided via user-supplied obstacles on topic ~/obstacles or obtained from the costmap_converter)
 legacy_obstacle_association: false #false
 obstacle_association_force_inclusion_factor : 1.5 #1.5
 obstacle_association_cutoff_factor : 5.0 # 5.0
 costmap_converter_plugin: "costmap_converter::CostmapToLinesDBSRANSAC" # ""
 costmap_converter_spin_thread: true
 costmap_converter_rate: 10.0 # 5.0
 

 # Optimization Parameters
 no_inner_iterations: 5  #3
 no_outer_iterations: 4  #2
 penalty_epsilon: 0.1
 weight_max_vel_x : 1.0 # 2.0
 weight_max_vel_theta : 1.0 # 1.0
 weight_acc_lim_x : 1.0 # 1.0
 weight_acc_lim_theta : 0.1 # 1.0
 weight_kinematics_nh : 1000.0 #1.0
 weight_kinematics_forward_drive : 9000  #向前走加強 1.0
 weight_kinematics_turning_radius : 1.0 #1.0
 weight_optimaltime : 1.0 # 0.5
 weight_obstacle : 100.0 # 50.0
 weight_viapoint : 0.8 # 從 1.0 降到 5.0  # 權重越大，TEB 越嚴格地貼著全域路徑行駛
 weight_inflation : 50.0 #0.1
 weight_adapt_factor : 2.0

 # Parallel Planning in distinctive Topologies
 enable_homotopy_class_planning: false # true false *
 enable_multithreading: false
 max_number_classes: 3
 selection_cost_hysteresis: 1.0 # 1.0 
 selection_obst_cost_scale : 100.0 # 100.0
 selection_viapoint_cost_scale : 1.0 # 1.0
 selection_alternative_time_cost : false # false true
 roadmap_graph_no_samples : 15 #15
 roadmap_graph_area_width : 6 # 6
 h_signature_prescaler : 1.0 #1.0
 h_signature_threshold : 0.1 #0.1
 obstacle_heading_threshold : 1.0 #1.0
 visualize_hc_graph : false # false true
 viapoints_all_candidates : false # true false
 switching_blocking_period : 0.0 #0.0

